services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: inverum
      MINIO_ROOT_PASSWORD: devpassword
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console → http://localhost:9001
    restart: unless-stopped

volumes:
  minio_data:
